name: Full Build & Test

on:
  push:
    tags: [ "*" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository_id }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  full_build_and_test:
    strategy:
      matrix:
        target:
          - target: "x86_64-unknown-linux-gnu"

          - target: "x86_64-unknown-linux-musl"

          - target: "x86_64-linux-android"
            android: true

          - target: "x86_64-unknown-freebsd"
            no_test: true

          - target: "x86_64-unknown-netbsd"
            no_test: true

          - target: "i686-unknown-linux-gnu"

          - target: "i686-unknown-linux-musl"

          - target: "i686-linux-android"
            android: true

          - target: "i686-unknown-freebsd"
            no_test: true

          - target: "aarch64-unknown-linux-gnu"

          - target: "aarch64-unknown-linux-musl"

          - target: "aarch64-linux-android"
            android: true

          - target: "arm-unknown-linux-gnueabihf"

          - target: "arm-unknown-linux-gnueabi"

          - target: "arm-unknown-linux-musleabihf"

          - target: "arm-unknown-linux-musleabi"

          - target: "arm-linux-androideabi"
            android: true

          - target: "x86_64-pc-windows-gnu"
            wine: true

          # Hopelessly broken
          # - target: "x86_64-pc-windows-gnullvm"

          - os: windows-2025
            toolchain: "x86_64-pc-windows-msvc"
            target: "x86_64-pc-windows-msvc"

          - target: "i686-pc-windows-gnu"
            wine: true

          # - target: "i686-pc-windows-gnullvm"

          - os: windows-2025
            toolchain: "x86_64-pc-windows-msvc"
            target: "i686-pc-windows-msvc"

          # - target: "aarch64-pc-windows-gnullvm"

          - os: windows-11-arm
            toolchain: "aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"

          - os: macos-15
            toolchain: "aarch64-apple-darwin"
            target: "x86_64-apple-darwin"

          - os: macos-15
            toolchain: "aarch64-apple-darwin"
            target: "aarch64-apple-darwin"

        toolchain_version:
          - "stable"
          - "nightly"

      fail-fast: false

    name: Build & Test ${{ matrix.target.target }} (${{ matrix.toolchain_version }})
    runs-on: ${{ matrix.target.os || 'ubuntu-24.04' }}
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies (Android)
        if: ${{ matrix.target.android }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-19 libunwind-19-dev android-libunwind android-libunwind-dev

      - name: Install Wine
        if: ${{ matrix.target.wine }}
        run: |
          sudo dpkg --add-architecture amd64
          sudo dpkg --add-architecture i386
          
          sudo mkdir -pm755 /etc/apt/keyrings
          wget -O - https://dl.winehq.org/wine-builds/winehq.key | sudo gpg --dearmor -o /etc/apt/keyrings/winehq-archive.key -  
          
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources
          
          sudo apt-get update
          sudo apt-get install --install-recommends -y winehq-stable

      - name: Setup Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain_version }}-${{ matrix.target.toolchain || 'x86_64-unknown-linux-gnu' }}
          target: ${{ matrix.target.target }}
          components: rustc, rustfmt, rust-std, rust-src, cargo, clippy
          rustflags: ""
          cache: true
          cache-on-failure: true
          matcher: true

      - name: Install Cross
        run: |
          cargo install cross

      - name: Configure Nightly
        if: ${{ matrix.toolchain_version == 'nightly' }}
        run: |
          sed -i'' -e 's/build-std = false/build-std = true/g' Cross.toml

      - name: Build
        run: |
          cross build --target ${{ matrix.target.target }} --release

      - name: Test
        if: ${{ !matrix.target.no_test }}
        run: |
          cross test --target ${{ matrix.target.target }} --release
